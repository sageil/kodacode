version: '3'

tasks:
  install:
    desc: Install dependencies
    cmds:
      - pnpm install

  dev:
    desc: Run local dev server (hot-reload at http://localhost:4321/kodacode/)
    cmds:
      - pnpm dev

  build:
    desc: Build static site to dist/
    cmds:
      - pnpm build

  preview:
    desc: Preview the built site locally
    deps: [build]
    cmds:
      - pnpm preview

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist .astro

  deploy:
    desc: Push to main to trigger GitHub Actions deploy
    cmds:
      - git push origin main
      - echo "Pushed — GitHub Actions will build and deploy to Pages"
